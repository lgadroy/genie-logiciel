{% extends "header&footer.html" %}

{% block title %}Carte{% endblock %}

{% block content %}

<section class="section">
    <h1>Carte de la France</h1>
    <p>
        Carte de la France avec possibilité de zoomer sur les différents départements et régions. 
    </p>
</section>
<div class="map-layout">
    <div class="map-sidebar">
        <div class="feature-input">
            <h3>Affichage :</h3>
            <label>
                <input type="radio" name="donnees" value="propre" checked>
                Propreté
            </label>
            <br>
            <label>
                <input type="radio" name="donnees" value="frequentation" checked>
                Fréquentation
            </label>
        </div>
        <br>
        <hr>
        <br>
        <div class="infoDep">
            <h3> Info département : </h3>
            <div id="info-Departement">
                Département sélectionné : Aucun
            </div>
        </div>
    </div>

    <section class="map-section">
        <svg id="map" width="800" height="900"></svg>
    </section>

</div>

<script src="{{ url_for('static', filename='JS/map.js')}}"></script>

{% endblock %}
